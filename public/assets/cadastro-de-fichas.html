<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fichas de Treino</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-brand">
        <ion-icon name="barbell-outline"></ion-icon>
        <span>GymProgress</span>
      </div>
      <ul class="navbar-links">
        <li>
          <a href="/"
            ><ion-icon name="home-outline"></ion-icon><span>Home</span></a
          >
        </li>
        <li>
          <a href="/fichas-salvas"
            ><ion-icon name="documents-outline"></ion-icon
            ><span>Fichas Salvas</span></a
          >
        </li>
        <li>
          <a href="/cadastro-de-fichas"
            ><ion-icon name="add-circle-outline"></ion-icon
            ><span>Nova Ficha</span></a
          >
        </li>
      </ul>
      <button class="menu-toggle" aria-label="Abrir menu">☰</button>
    </nav>
    <div class="mobile-menu">
      <ul>
        <li>
          <a href="/"><ion-icon name="home-outline"></ion-icon> Home</a>
        </li>
        <li>
          <a href="/fichas-salvas"
            ><ion-icon name="documents-outline"></ion-icon> Fichas Salvas</a
          >
        </li>
        <li>
          <a href="/cadastro-de-fichas"
            ><ion-icon name="add-circle-outline"></ion-icon> Nova Ficha</a
          >
        </li>
      </ul>
    </div>

    <div class="container">
      <h1>Cadastro de Fichas</h1>
      <form id="form-ficha" class="form-ficha">
        <div class="form-group">
          <label>Nome</label><input type="text" id="nome" name="nome" />
        </div>
        <div class="form-group">
          <label>Email</label><input type="email" id="email" name="email" />
        </div>
        <div class="form-group">
          <label>Peso (kg)</label><input type="number" id="peso" name="peso" />
        </div>
        <div class="form-group">
          <label>Peito (cm)</label
          ><input type="number" id="peito" name="peito" max="200" min="0" />
        </div>
        <div class="form-group">
          <label>Abdômen (cm)</label
          ><input type="number" id="abdomen" name="abdomen" />
        </div>
        <div class="form-group">
          <label>Ombros (cm)</label
          ><input type="number" id="ombros" name="ombros" />
        </div>
        <div class="form-group">
          <label>Quadríceps Esquerdo (cm)</label
          ><input
            type="number"
            id="quadriceps-esquerdo"
            name="quadricepsEsquerdo"
          />
        </div>
        <div class="form-group">
          <label>Quadríceps Direito (cm)</label
          ><input
            type="number"
            id="quadriceps-direito"
            name="quadricepsDireito"
          />
        </div>
        <div class="form-group">
          <label>Panturrilha Esquerda (cm)</label
          ><input
            type="number"
            id="panturrilha-esquerda"
            name="panturrilhaEsquerda"
          />
        </div>
        <div class="form-group">
          <label>Panturrilha Direita (cm)</label
          ><input
            type="number"
            id="panturrilha-direita"
            name="panturrilhaDireita"
          />
        </div>
        <div class="form-group">
          <label>Bíceps Esquerdo (cm)</label
          ><input type="number" id="biceps-esquerdo" name="bicepsEsquerdo" />
        </div>
        <div class="form-group">
          <label>Bíceps Direito (cm)</label
          ><input type="number" id="biceps-direito" name="bicepsDireito" />
        </div>
        <button id="btn-salvar" class="btn">Salvar</button>
      </form>
    </div>

    <script type="module" src="/assets/js/bundle.js"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
